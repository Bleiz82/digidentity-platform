services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: digidentity
      POSTGRES_PASSWORD: digidentity
      POSTGRES_DB: digidentity_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U digidentity -d digidentity_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
