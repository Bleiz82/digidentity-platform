name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  # Required checks for merge — subset of ci.yml
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: digidentity_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/digidentity_test
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/digidentity_test
      EMBEDDING_PROVIDER: mock
      ANTHROPIC_API_KEY: ""
      OPENAI_API_KEY: ""
      TESTCONTAINERS_RYUK_DISABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --group dev

      - name: Pre-pull testcontainers image
        run: docker pull pgvector/pgvector:pg16

      - name: Run Alembic migrations
        working-directory: apps/api
        run: uv run alembic upgrade head

      - name: Run tests
        working-directory: apps/api
        run: uv run pytest tests/ -q

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Run tests
        working-directory: apps/web
        run: pnpm test

  lint-packs:
    name: Lint Packs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "apps/api/uv.lock"

      - name: Install dependencies
        working-directory: apps/api
        run: uv sync --group dev

      - name: Lint pack morph rules
        working-directory: apps/api
        run: uv run python ../../tools/lint-pack/lint_pack.py --all
