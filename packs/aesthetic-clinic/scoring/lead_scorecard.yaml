version: "1.0"
description: "Lead scoring scorecard for aesthetic-clinic pack — BIBLE §6.5. GDPR: solo segnali di intent commerciale osservabile, nessun dato clinico/diagnostico/sanitario."

# NOTA GDPR: Nessun segnale su diagnosi, patologie, condizioni mediche o storia clinica.
# Solo comportamento commerciale osservabile: navigazione, richieste esplicite, contatti.
signals:
  - id: contact_requested
    weight: 25
    max_score: 25
    description: "Visitor explicitly requested contact or consultation"

  - id: appointment_booked
    weight: 25
    max_score: 25
    description: "Visitor completed appointment booking flow"

  - id: specific_treatment_asked
    weight: 15
    max_score: 15
    description: "Visitor asked about a specific aesthetic treatment (commercial intent)"

  - id: budget_mentioned
    weight: 10
    max_score: 10
    description: "Visitor mentioned a budget or asked about pricing"

  - id: before_after_viewed
    weight: 10
    max_score: 10
    description: "Visitor engaged with before/after gallery (strong aesthetic intent)"

  - id: financing_question
    weight: 8
    max_score: 8
    description: "Visitor asked about financing, installment plans, or payment terms"

  - id: urgency_event_date
    weight: 10
    max_score: 10
    description: "Visitor mentioned a specific event date driving urgency (commercial intent)"

  - id: multi_treatment_interest
    weight: 8
    max_score: 8
    description: "Visitor expressed interest in multiple treatments in the same session"

  - id: location_specific
    weight: 5
    max_score: 5
    description: "Visitor mentioned a specific location or asked about clinic address"

  - id: return_visitor
    weight: 5
    max_score: 5
    description: "Visitor has returned from a previous session"

# Score buckets — aligned with BIBLE §2.5 thresholds
buckets:
  cold:
    min: 0
    max: 29
  warm:
    min: 30
    max: 69
  hot:
    min: 70
    max: 100

# Flat point modifier added to final score by top inferred persona
# Positive = bonus, negative = malus. Applied before bucket assignment.
persona_modifiers:
  anti_aging: 3
  body_contouring: 3
  post_pregnancy: 4
  special_event: 5
  browsing: -5
