# Evaluation cases for real-estate-luxury pack retrieval
# Phase 1: Calibration mode - measure without blocking CI

meta:
  name: "Real Estate Luxury Retrieval Evaluation"
  description: "End-to-end retrieval evaluation across lifestyle, features, and general queries in Italian real estate luxury context. Uses recall@K methodology due to stub embedding semi-determinism."
  calibration_mode: true
  thresholds:
    ndcg_at_10: 0.70
    mrr: 0.60

cases:
  # ========== LIFESTYLE QUERIES (10) ==========
  # Semantic queries about atmosphere, experience, lifestyle
  # weights: lifestyle=0.70, content=0.15, features=0.15

  - id: re-lifestyle-001
    type: retrieval
    tags: [lifestyle, mare, vacanze]
    input:
      query: "cerco una casa con vista sul mare dove rilassarsi la sera e svegliarsi al suono delle onde"
      query_type: lifestyle
      weights_override:
        lifestyle: 0.70
        content: 0.15
        features: 0.15
      limit: 10
    expected:
      min_results: 10
      in_top_k:
        - slug: villa-asfodelo-porto-cervo
          k: 10
        - slug: villa-marina-grande-positano
          k: 10
        - slug: residenza-ginepro-porto-rotondo
          k: 10

