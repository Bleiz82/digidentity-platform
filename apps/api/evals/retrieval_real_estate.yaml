# Evaluation cases for real-estate-luxury pack retrieval
# Phase 1: Calibration mode - pipeline correctness test with stub embeddings

meta:
  name: "Real Estate Luxury Retrieval Evaluation"
  description: "End-to-end retrieval evaluation across lifestyle, features, and general queries in Italian real estate luxury context."
  calibration_mode: false
  baseline_run: "6ae91f8"
  quality_proxy: "stub_embedding_exact_text"
  # NOTE: query text = exact rendered template text of target entity.
  # Stub hash-based embeddings require identical text for identical embedding vector.
  # This tests pipeline correctness (template→embedding→search→ranking), not semantic retrieval.
  # Natural language query eval deferred to Phase 2 (real embeddings).
  # Archive: evals/_archive/retrieval_natural_queries_phase1.yaml
  thresholds:
    ndcg_at_10: 0.45   # measured 0.532 × 0.85 ≈ 0.452
    mrr: 0.44           # measured 0.525 × 0.85 ≈ 0.446
    recall_at_10: 0.46  # measured 0.550 × 0.85 ≈ 0.468
    min_results_rate: 1.0  # deterministic

cases:
  # ========== LIFESTYLE QUERIES (10) ==========
  # query = exact rendered lifestyle_template text of target entity.
  # Stub embeddings are hash-based: identical text → identical vector → rank #1.
  # weights: lifestyle=0.70, content=0.15, features=0.15

  - id: re-lifestyle-001
    type: retrieval
    tags: [lifestyle, mare, sardegna]
    input:
      query: "mare · exclusivita · design\n\nMattine in piscina infinity con vista sul golfo, cene sulla terrazza al tramonto. Porto Cervo a 5 minuti.\n\nIl cuore della Costa Smeralda, circondato da boutique di lusso e ristoranti stellati.\n\nSpazi outdoor: terrazza panoramica, giardino privato, piscina infinity.\n\nWellness e benessere: sauna, zona relax bordo piscina."
      query_type: lifestyle
      weights_override:
        lifestyle: 0.70
        content: 0.15
        features: 0.15
      limit: 10
    expected:
      min_results: 10
      in_top_k:
        - slug: villa-asfodelo-porto-cervo
          k: 10

